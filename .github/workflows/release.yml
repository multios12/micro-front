name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            archive_ext: tar.gz
          - runner: ubuntu-latest
            goos: linux
            goarch: arm64
            archive_ext: tar.gz
          - runner: windows-latest
            goos: windows
            goarch: amd64
            archive_ext: zip
          - runner: macos-latest
            goos: darwin
            goarch: amd64
            archive_ext: tar.gz
          - runner: macos-latest
            goos: darwin
            goarch: arm64
            archive_ext: tar.gz

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.14.1"
          cache: yarn
          cache-dependency-path: front/yarn.lock

      - name: Install front dependencies
        working-directory: front
        run: yarn install --frozen-lockfile

      - name: Build admin page
        working-directory: front
        run: yarn build

      - name: Build binary
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          outdir="dist/${GOOS}-${GOARCH}"
          mkdir -p "$outdir"
          binname="micro-front"
          if [ "$GOOS" = "windows" ]; then
            binname="micro-front.exe"
          fi
          go build -o "$outdir/$binname" ./cmd/micro-front

      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail
          outdir="dist/${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            (cd "$outdir" && zip -r "../micro-front-${{ matrix.goos }}-${{ matrix.goarch }}.zip" .)
          else
            (cd "$outdir" && tar -czf "../micro-front-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" .)
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: micro-front-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/micro-front-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.archive_ext }}
          if-no-files-found: error

  release:
    name: publish release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*
