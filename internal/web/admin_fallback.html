<!doctype html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>micro-front admin</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }

    main {
      max-width: 42rem;
      padding: 2rem;
      border: 1px solid rgba(148, 163, 184, 0.25);
      border-radius: 1rem;
      background: rgba(15, 23, 42, 0.72);
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 1rem;
      font-size: 2rem;
    }

    p {
      margin: 0 0 0.75rem;
      line-height: 1.7;
    }

    code {
      display: inline-block;
      padding: 0.15rem 0.4rem;
      border-radius: 0.4rem;
      background: rgba(148, 163, 184, 0.16);
      color: #f8fafc;
    }
  </style>
</head>

<body>
  <main>
    <h1>micro-front 管理画面</h1>
    <p>このHTMLはバイナリに埋め込まれたフォールバックです。</p>
    <p><code>data/admin.html</code> が存在する場合は、そちらが優先されます。</p>
    <p>Docker イメージ内に外部ファイルが無くても、ルート <code>/</code> で表示できます。</p>
  </main>
</body>

</html>
