name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-front:
    name: build admin page
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.15.0"
          cache: yarn
          cache-dependency-path: front/yarn.lock

      - name: Install front dependencies
        working-directory: front
        run: yarn install --frozen-lockfile

      - name: Build admin page
        working-directory: front
        run: yarn build

      - name: Upload admin page artifact
        uses: actions/upload-artifact@v6
        with:
          name: admin-html
          path: internal/web/admin.html
          if-no-files-found: error

  build:
    name: build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ${{ matrix.runner }}
    needs: build-front
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            archive_ext: tar.gz
          - runner: ubuntu-latest
            goos: linux
            goarch: arm64
            archive_ext: tar.gz
          - runner: windows-latest
            goos: windows
            goarch: amd64
            archive_ext: zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Download admin page artifact
        uses: actions/download-artifact@v7
        with:
          name: admin-html
          path: internal/web

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"

      - name: Restore Go cache
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ matrix.goos }}-${{ matrix.goarch }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ matrix.goos }}-${{ matrix.goarch }}-
            ${{ runner.os }}-go-

      - name: Build binary
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          outdir="dist/${GOOS}-${GOARCH}"
          mkdir -p "$outdir"
          binname="micro-front"
          if [ "$GOOS" = "windows" ]; then
            binname="micro-front.exe"
          fi
          go build -o "$outdir/$binname" ./cmd/micro-front

      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail
          outdir="dist/${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            powershell.exe -NoLogo -NoProfile -Command "Compress-Archive -Path '$outdir/*' -DestinationPath 'dist/micro-front-${{ matrix.goos }}-${{ matrix.goarch }}.zip' -Force"
          else
            (cd "$outdir" && tar -czf "../micro-front-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" .)
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: micro-front-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/micro-front-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.archive_ext }}
          if-no-files-found: error

  release:
    name: publish release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*
